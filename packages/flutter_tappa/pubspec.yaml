name: flutter_tappa
description: "SoftPOS SDK for Flutter"
version: 0.0.6
homepage: "https://github.com/lilvinco/flutter_tappa"

environment:
  sdk: ^3.5.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  qr_code_scanner_plus: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.mba.flutter_tappa
        pluginClass: FlutterTappaPlugin

false_secrets:
  - "**/*/libnfcNative.so"